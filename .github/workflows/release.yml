# Gera um Android App Bundle (.aab) assinado, pronto para upload manual na
# Google Play Console. Não publica nada sozinho — o artefato fica disponível
# para download na aba "Actions" > execução deste workflow > "Artifacts".
#
# ── Secrets necessários (Settings > Secrets and variables > Actions) ────────
#   KEYSTORE_BASE64    conteúdo do .jks/.keystore de upload, em base64
#                       (gerar com: base64 -w0 minha-chave.jks)
#   KEYSTORE_PASSWORD   senha do keystore
#   KEY_ALIAS           alias da chave dentro do keystore
#   KEY_PASSWORD        senha da chave (pode ser igual à do keystore)
#
# Se esses secrets não existirem, o bundle é gerado sem assinatura (útil só
# para inspecionar o conteúdo) — a Play Console rejeita upload sem assinatura.
name: Release Play Store bundle

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Permitir execução do gradlew
        run: chmod +x gradlew

      - name: Decodificar keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Gerar bundle assinado (.aab)
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && format('{0}/release.keystore', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Sempre crescente entre execuções — requisito da Play Store para
          # aceitar um novo upload do mesmo applicationId.
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload do artefato (.aab)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload do mapping do ProGuard/R8
        uses: actions/upload-artifact@v4
        with:
          name: proguard-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
          retention-days: 30
